<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Elyze Solutions banner</title>
  <desc id="desc">AI integration, infrastructure, DevOps, and custom software systems built for production.</desc>
  <defs>
